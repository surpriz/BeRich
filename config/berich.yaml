# Mode for selecting which universe `berich data` / `berich backtest`
# operate on. "mega" = the 10-ticker watchlist; "mid" + "small" use the
# lists above; "all" = the union. Phase 6 default stays "mega" so existing
# production behavior is unchanged unless the user explicitly opts in.

# Triple-barrier labeling defaults (used in Phase 1). ATR-relative barriers.
labeling:
  horizon_days: 10        # vertical (time) barrier
  atr_window: 14
  take_profit_atr: 2.0    # upper barrier = entry + tp * ATR
  stop_loss_atr: 1.0      # lower barrier = entry - sl * ATR
  # Exit strategy the label/backtest simulate: fixed (TP/SL barrier, the baseline),
  # trailing (ratcheting stop, no TP — let winners run) or trailing_tp (TP cap + ratchet).
  exit_mode: fixed
  trailing_atr: 2.5             # pure-trailing trail distance (wide: let winners run)
  trailing_tp_atr: 1.0          # trailing_tp trail distance (tight: lock profit before the +2 ATR cap)
  trailing_activation_atr: 1.0  # arm the trail after a favorable move of this many ATRs

# Daily signal generation & position sizing (Phase 4).
signals:
  # Thresholds on the (calibrated) win probability. The triple barrier is 2:1 (target
  # 2·ATR vs stop 1·ATR), so breakeven is ~0.33, not 0.50 — a BUY needs the calibrated
  # P(win) comfortably above breakeven, hence 0.45 rather than the old over-confident 0.55.
  # Calibrated P(win) clusters near the ~0.32 base rate; breakeven on the 2:1 barrier is
  # ~0.33. 0.35 sits just above breakeven (still positive expectancy) and is reachable on
  # the calibrated scale, so the tool actually emits BUYs instead of staying permanently NEUTRAL.
  buy_threshold: 0.35     # calibrated P(win) >= this -> BUY
  sell_threshold: 0.30    # calibrated P(win) <= this -> SELL / exit bias (negative expectancy)
  capital: 10000.0        # account size for sizing
  risk_pct: 0.01          # fraction of capital risked per trade (to the stop)

# Phase polish v2 — multi-asset universes. The model was trained on US
