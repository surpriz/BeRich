# BeRich configuration — v1 scope: US equities, daily bars, swing horizon.

# Where the Parquet OHLCV cache and DuckDB catalog live (relative to project root).
data_dir: "data"

# Market data fetch settings.
data:
  interval: "1d"          # daily bars (swing, no intraday)
  start_date: "2010-01-01"
  auto_adjust: true       # split/dividend-adjusted prices — avoids fake gaps

# Intraday V2 POC — PAUSED (2026-06-10). The POC showed no promotable 1h edge on BTC after a
# full deep HPO (longs Sharpe ~-5, shorts negative; nothing cleared the guard), and each 1h fit
# costs ~20x a daily fit (77k bars). Disabled to give 100% of the GPU back to the 180-asset swing
# book. Reversible: set enabled=true + restart berich-{sweep,scheduler}; the 1h models, Optuna
# studies, DB and cache are all preserved on disk. Crypto 1h, single pair BTC/USDT, same guard.
intraday:
  enabled: false
  interval: "1h"
  bars_per_year: 8760
  overnight_gap: false    # 24/7 market → no overnight gap feature
  horizon_bars: 24        # forward window in bars (24 = one day)
  tickers: ["BTC-USD"]    # mapped to BTC/USDT at fetch time

# Tickers to track. Keep small for v1; expand once the pipeline is validated.
watchlist:
  - AAPL
  - MSFT
  - NVDA
  - AMZN
  - GOOGL
  - META
  - JPM
  - XOM
  - JNJ
  - SPY   # benchmark / market proxy

