# Mode for selecting which universe `berich data` / `berich backtest`
# operate on. "mega" = the 10-ticker watchlist; "mid" + "small" use the
# lists above; "all" = the union. Phase 6 default stays "mega" so existing
# production behavior is unchanged unless the user explicitly opts in.

# Triple-barrier labeling defaults (used in Phase 1). ATR-relative barriers.
labeling:
  horizon_days: 10        # vertical (time) barrier
  atr_window: 14
  take_profit_atr: 2.0    # upper barrier = entry + tp * ATR
  stop_loss_atr: 1.0      # lower barrier = entry - sl * ATR

# Daily signal generation & position sizing (Phase 4).
signals:
  buy_threshold: 0.55     # P(win) >= this -> BUY
  sell_threshold: 0.30    # P(win) <= this -> SELL / exit bias
  capital: 10000.0        # account size for sizing
  risk_pct: 0.01          # fraction of capital risked per trade (to the stop)

# Phase polish v2 — multi-asset universes. The model was trained on US
# stocks only; signals on the other classes are emitted using the same
# pipeline but flagged "experimental" in the UI. Empty lists are fine —
# the scheduler simply skips them. yfinance ticker syntax: ``.PA`` for
# Euronext Paris, ``=X`` for spot FX pairs, ``-USD`` for crypto,
# ``=F`` for futures contracts (continuous front-month).
universes:
  us_stocks:
    - AAPL
    - MSFT
    - NVDA
    - AMZN
    - GOOGL
    - META
    - JPM
    - XOM
    - JNJ
    - SPY
  fr_stocks:
    - AIR.PA       # Airbus
    - MC.PA        # LVMH
    - BNP.PA       # BNP Paribas
    - OR.PA        # L'Oréal
    - SAN.PA       # Sanofi
    - TTE.PA       # TotalEnergies
    - SU.PA        # Schneider Electric
    - DG.PA        # Vinci
  forex:
    - EURUSD=X
    - GBPUSD=X
    - USDJPY=X
    - AUDUSD=X
    - USDCAD=X
  crypto:
    - BTC-USD
    - ETH-USD
    - SOL-USD
  commodities:
    - GC=F         # gold front-month
    - CL=F         # WTI crude front-month
    - SI=F         # silver front-month
