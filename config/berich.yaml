# BeRich configuration — v1 scope: US equities, daily bars, swing horizon.

# Where the Parquet OHLCV cache and DuckDB catalog live (relative to project root).
data_dir: "data"

# Market data fetch settings.
data:
  interval: "1d"          # daily bars (swing, no intraday)
  start_date: "2010-01-01"
  auto_adjust: true       # split/dividend-adjusted prices — avoids fake gaps

# Tickers to track. Keep small for v1; expand once the pipeline is validated.
watchlist:
  - AAPL
  - MSFT
  - NVDA
  - AMZN
  - GOOGL
  - META
  - JPM
  - XOM
  - JNJ
  - SPY   # benchmark / market proxy

# Cross-asset context series. Downloaded by `berich data` and read by
# features/build.py to provide regime, vol, rates, credit, and sectoral
# information that is not in any single ticker's OHLCV. Never traded.
context_tickers:
  - ^VIX     # implied vol — fear gauge
  - ^VIX9D   # short-term VIX (numerator of vix_term ratio)
  - TLT      # 20+ year Treasuries — long-end rates proxy
  - HYG      # high-yield credit
  - LQD      # investment-grade credit (HYG-LQD = risk-on/risk-off)
  - XLK      # Technology sector
  - XLF      # Financials sector
  - XLE      # Energy sector
  - XLV      # Health Care sector
  - XLY      # Consumer Discretionary sector
  - XLC      # Communication Services sector
  - XLI      # Industrials sector (future-proof)
  - XLP      # Consumer Staples sector (future-proof)

# Triple-barrier labeling defaults (used in Phase 1). ATR-relative barriers.
labeling:
  horizon_days: 10        # vertical (time) barrier
  atr_window: 14
  take_profit_atr: 2.0    # upper barrier = entry + tp * ATR
  stop_loss_atr: 1.0      # lower barrier = entry - sl * ATR

# Daily signal generation & position sizing (Phase 4).
signals:
  buy_threshold: 0.55     # P(win) >= this -> BUY
  sell_threshold: 0.30    # P(win) <= this -> SELL / exit bias
  capital: 10000.0        # account size for sizing
  risk_pct: 0.01          # fraction of capital risked per trade (to the stop)
